<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0b1220">
  <title>Math Drills — Dark + Stats + Division (Mobile)</title>
  <style>
    :root{
      --bg:#0b1220; --surface:#111a2b; --muted:#1a2440;
      --text:#e5e7eb; --subtle:#aeb6c2;
      --blue:#3b82f6; --blue-d:#2563eb;
      --good:#16a34a; --bad:#ef4444;
      --shadow:0 10px 28px rgba(0,0,0,.35); --radius:14px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; padding:24px;
      padding-left:max(24px, env(safe-area-inset-left));
      padding-right:max(24px, env(safe-area-inset-right));
      padding-top:max(24px, env(safe-area-inset-top));
      padding-bottom:max(24px, env(safe-area-inset-bottom));
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg); color:var(--text);
      display:flex; flex-direction:column; align-items:center; gap:16px;
      -webkit-tap-highlight-color: transparent;
    }
    h1{margin:0 0 4px; font-size:clamp(1.25rem, 3.8vw, 1.6rem); letter-spacing:.2px}
    .sub{color:var(--subtle); font-size:clamp(.9rem, 2.8vw, .95rem)}

    button,input,select{touch-action:manipulation}

    .topbar{width:100%; max-width:1000px; display:flex; justify-content:space-between; align-items:center; position:relative}
    .ghost{
      background:transparent; color:var(--text); border:1px solid var(--muted);
      padding:.6rem .9rem; border-radius:999px; cursor:pointer; min-height:48px;
    }
    .ghost:hover{background:var(--muted)}

    .panel{width:100%; max-width:1000px; background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px}
    #menu h2,#settings h2{margin:0 0 .6rem; font-size:clamp(1.05rem, 3.8vw, 1.2rem)}
    .mode-row{display:flex; gap:12px; align-items:center; margin:.25rem 0 .75rem; flex-wrap:wrap}
    .mode-row label{display:flex; gap:.45rem; align-items:center; padding:.25rem .5rem; border-radius:999px; background:#0f1a30}
    .badge{background:var(--muted); color:var(--text); border-radius:999px; padding:.25rem .6rem; font-size:.9rem}

    .grid{display:grid; gap:.6rem; grid-template-columns:repeat(auto-fit, minmax(220px,1fr));}
    .grid button,#back,.pill,.danger,#submitBtn{
      border:0; border-radius:12px; padding:.85rem 1rem; cursor:pointer; font-weight:600;
      box-shadow:0 6px 18px rgba(0,0,0,.25); min-height:48px;
    }
    .grid button,#back,.pill,#submitBtn{ background:var(--blue); color:#fff; }
    .grid button:hover,#back:hover,.pill:hover,#submitBtn:hover{ background:var(--blue-d); }
    .danger{ background:#b91c1c; color:#fff } .danger:hover{ background:#991b1b }

    #quiz{max-width:720px; margin-inline:auto;}
    #hud{display:flex; gap:.6rem; justify-content:center; flex-wrap:wrap; margin:.25rem 0 .5rem}
    .pill{background:#0f1a30}
    #question{
      background:var(--muted); border-radius:var(--radius); padding:14px;
      font-size:clamp(1.4rem, 7vw, 1.9rem); text-align:center; margin:.6rem 0;
    }
    #answer{
      width:min(420px, 100%); padding:1rem .9rem; font-size:clamp(1.1rem, 5.5vw, 1.25rem);
      text-align:center; border:2px solid #2a3558; border-radius:12px; background:#0e1730; color:#fff;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.03); min-height:52px;
    }
    #answer:disabled{opacity:.7}
    #feedback{min-height:1.4rem; margin:.6rem 0 0; font-size:clamp(1rem, 4.5vw, 1.1rem)}
    .correct{color:var(--good)} .wrong{color:var(--bad)}
    .row{display:flex; gap:.6rem; justify-content:center; margin-top:.8rem; flex-wrap:wrap}
    .visually-hidden{position:absolute; left:-9999px}

    #settings .controls{display:flex; flex-wrap:wrap; gap:.6rem; align-items:center; margin:.5rem 0 .75rem}
    select{background:#0e1730; color:#fff; border:1px solid #2a3558; border-radius:10px; padding:.6rem .7rem; min-height:44px;}
    table{width:100%; border-collapse:collapse; margin-top:.5rem; font-size:.95rem}
    th,td{padding:.55rem .6rem; text-align:left; border-bottom:1px solid #1e2a4a}
    th{color:#b9c2d0; font-weight:600}
    tbody tr:hover{background:#0f1934}
    .mono{font-variant-numeric:tabular-nums}
    .small{font-size:.85rem; color:#c7ceda}
    .right{text-align:right}
    .drilltag{background:#0f1a30; padding:.15rem .5rem; border-radius:999px; font-size:.8rem}

    /* Modal */
    .modal{position:fixed; inset:0; display:flex; align-items:center; justify-content:center; padding:16px; z-index:50;}
    .modal[hidden]{display:none}
    .backdrop{position:absolute; inset:0; background:rgba(0,0,0,.6)}
    .sheet{position:relative; background:var(--surface); border-radius:16px; box-shadow:var(--shadow); width:min(980px, 100%); max-height:85vh; overflow:auto; padding:14px}
    .sheet h3{margin:0 0 .5rem}

    /* COMPACT reference visuals */
    .refgrid{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:.2rem}
    .card{background:#0f1a30; border:1px solid #223055; border-radius:10px; padding:.3rem .4rem}
    .card h4{margin:0 0 .12rem; font-size:.86rem; font-weight:700; letter-spacing:.3px; color:#d6dbe6; text-transform:uppercase}
    .card table{font-size:.88rem; width:100%}
    .card th,.card td{padding:.16rem .32rem; border-bottom:1px solid rgba(27,39,70,.7)}
    .card tr:last-child td{border-bottom:none}
    .card tbody tr:nth-child(even){background:rgba(255,255,255,.028)}
    .card tbody tr:hover{background:rgba(59,130,246,.12)}
    .tighttable{font-size:.84rem}
    .tighttable th,.tighttable td{padding:.12rem .14rem; text-align:center}
    .tighttable td:first-child{text-align:left}

    .close{position:absolute; top:8px; right:8px; background:#0f1a30; border:1px solid #223055; border-radius:10px; color:#text; padding:.3rem .5rem; cursor:pointer}

    .acc-dot{display:inline-block;width:7px;height:7px;border-radius:50%;vertical-align:middle;margin-right:2px}
    .sprint-rec-btn{cursor:pointer;transition:opacity .15s}
    .sprint-rec-btn:hover{opacity:.8}

    /* Mobile tweaks */
    #submitBtn{display:none}
    @media (max-width: 640px){
      body{padding:16px; padding-bottom:max(16px, env(safe-area-inset-bottom));}
      .panel{padding:14px}
      .grid{grid-template-columns:1fr}
      #hud{position:sticky; top:calc(56px + env(safe-area-inset-top)); z-index:5}
      .topbar{position:sticky; top:0; z-index:6}
      #answer{width:100%}
      #submitBtn{display:inline-block; width:100%; margin-top:.6rem}
      #back{width:100%}
      .refgrid{grid-template-columns:repeat(auto-fit,minmax(110px,1fr))}
    }
  </style>
</head>
<body>
  <div class="topbar panel" style="display:flex; gap:12px; align-items:center;">
    <div>
      <h1>Math Drills</h1>
      <div class="sub">Dark mode • adaptive practice • sprint • stats <span id="versionBadge" style="margin-left:.5rem;font-size:.78rem;opacity:.5"></span></div>
    </div>
    <div style="margin-left:auto; display:flex; gap:8px; align-items:center;">
      <button id="openSettings" class="ghost">⚙️ Settings & Stats</button>
    </div>
  </div>

  <!-- MENU -->
  <div id="menu" class="panel">
    <h2>Choose a drill</h2>
    <div class="mode-row">
      <label><input type="radio" name="mode" value="practice"> Practice</label>
      <label><input type="radio" name="mode" value="sprint" checked> 1-min Sprint</label>
      <span id="bestBadge" class="badge" hidden>Best: <b id="bestMenu">0</b></span>
    </div>
    <div class="grid">
      <button data-drill="mixed">Mixed (no addition; no zero-cancel)</button>
      <button data-drill="mult12">12 × (1–15)</button>
      <button data-drill="mult16">16 × (1–11)</button>
      <button data-drill="mult1216">12× & 16×</button>
      <button data-drill="mult15x">15 × (2–15)</button>
      <button data-drill="mult10">Multiplication 1–10 (no ×1, downweight easy)</button>
      <button data-drill="mult15">Multiplication 1–15 (no ×1, downweight easy)</button>
      <button data-drill="addTable">Addition facts (1–15)</button>
      <button data-drill="subTable">Subtraction facts (≤15)</button>
      <button data-drill="div">Division (tables ≤20)</button>
      <button data-drill="divZeros">Division (zero-canceling)</button>
      <button data-drill="add2">Two-digit addition</button>
      <button data-drill="sub2">Two-digit subtraction</button>
      <button data-drill="squares">Perfect squares (1²–25²)</button><!-- updated label -->
      <button data-drill="cubes">Perfect cubes (1³–10³)</button>
      <button data-drill="roots">√2, √3, √5 (3 decimals)</button>
      <button data-drill="exp2">Powers of 2 (1–10)</button>
      <button data-drill="exp3">Powers of 3 (1–5)</button>
      <button data-drill="exp4">Powers of 4 (1–5)</button>
      <button data-drill="exp5">Powers of 5 (1–5)</button>
      <button data-drill="decimals">Fractions → decimals</button>
      <button data-drill="pi">π — How many can you remember?</button>
    </div>
    <div id="sprintRecords" hidden>
      <hr style="border:none;border-top:1px solid var(--muted);margin:.75rem 0 .5rem">
      <div class="small" style="margin-bottom:.5rem">Your sprint records</div>
      <div id="sprintRecordsGrid" style="display:flex;flex-wrap:wrap;gap:.4rem"></div>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="panel" hidden>
    <div id="hud" hidden>
      <span id="hudDrill" class="pill">—</span>
      <span id="hudTimer" class="pill" hidden>⏱️ <b id="tLeft">60</b>s</span>
      <span id="hudScore" class="pill" hidden>Score: <b id="score">0</b></span>
      <span id="hudBest" class="pill" hidden>Best: <b id="best">0</b></span>
      <button id="refBtn" class="ghost" hidden>📘 Reference</button>
    </div>

    <div id="question"></div>
    <label for="answer" class="visually-hidden">Answer</label>
    <div style="display:flex; justify-content:center;">
      <input id="answer" type="text" inputmode="decimal" enterkeyhint="go" autocapitalize="off" autocomplete="off" autocorrect="off"/>
    </div>
    <button id="submitBtn" class="pill" aria-label="Check answer (mobile)">Check / Next</button>
    <div id="feedback" aria-live="polite"></div>
    <div id="endpanel"></div>

    <div class="row">
      <button id="back">Back</button>
    </div>
  </div>

  <!-- SETTINGS / STATS -->
  <div id="settings" class="panel" hidden>
    <h2>Settings & Stats</h2>
    <div class="controls">
      <label>Filter drill:
        <select id="fltDrill">
          <option value="">All</option>
          <option value="mixed">Mixed</option>
          <option value="mult12">12 ×</option>
          <option value="mult16">16 ×</option>
          <option value="mult1216">12× & 16×</option>
          <option value="mult15x">15 × (2–15)</option>
          <option value="mult10">Mult 1–10</option>
          <option value="mult15">Mult 1–15</option>
          <option value="addTable">Addition facts</option>
          <option value="subTable">Subtraction facts</option>
          <option value="div">Division</option>
          <option value="divZeros">Division (zero-canceling)</option>
          <option value="add2">Addition</option>
          <option value="sub2">Subtraction</option>
          <option value="squares">Squares</option><!-- label stays short here -->
          <option value="cubes">Cubes</option>
          <option value="roots">Roots</option>
          <option value="exp2">2^</option>
          <option value="exp3">3^</option>
          <option value="exp4">4^</option>
          <option value="exp5">5^</option>
          <option value="decimals">Decimals</option>
          <option value="pi">π digits</option>
        </select>
      </label>
      <label>Sort by:
        <select id="fltSort">
          <option value="wrongs">Most wrongs</option>
          <option value="rate">Lowest accuracy</option>
          <option value="recent">Most recent miss</option>
          <option value="attempts">Most attempts</option>
        </select>
      </label>
      <button id="clearStats" class="danger">Clear mistake stats</button>
      <button id="clearScores" class="ghost">Clear high scores</button>
      <button id="closeSettings" class="ghost" style="margin-left:auto">Back to menu</button>
    </div>
    <div id="statsContainer"></div>
  </div>

  <!-- REFERENCE MODAL -->
  <div id="refModal" class="modal" hidden>
    <div class="backdrop" id="refCloseBg"></div>
    <div class="sheet">
      <button class="close" id="refCloseBtn">✖</button>
      <h3 id="refTitle">Reference</h3>
      <div id="refContent"></div>
    </div>
  </div>

  <!-- HISTORY MODAL -->
  <div id="historyModal" class="modal" hidden>
    <div class="backdrop" id="histCloseBg"></div>
    <div class="sheet">
      <button class="close" id="histCloseBtn">✖</button>
      <h3 id="histTitle">Sprint History</h3>
      <div id="histEmpty" class="small" style="text-align:center;padding:2rem;display:none">No sprint history yet. Complete a sprint to start tracking.</div>
      <canvas id="histChart" style="display:block;width:100%;border-radius:8px;background:#0b1220"></canvas>
      <div class="small" style="margin-top:.5rem;text-align:center;color:#5a6a8a">Gold dot = personal best &nbsp;·&nbsp; Dashed line = best score</div>
    </div>
  </div>

  <script>
    const VERSION='v26.05.27-1';
    document.getElementById('versionBadge').textContent=VERSION;

    /******** Helpers & constants ********/
    const rand=(min,max)=>Math.floor(Math.random()*(max-min+1))+min;
    const SPRINT_SECONDS=60;
    const SIMPLE_BIAS=0.35;
    const isSimple=(a,b)=> (a<=3||b<=3||a===5||b===5||a===10||b===10);
    const fmt=n=> n.toLocaleString('en-CA');
    const parseIntClean = s => { const cleaned = s.replace(/,/g,'').trim(); const v = parseInt(cleaned,10); return Number.isNaN(v) ? NaN : v; };

    // Fractions list (for decimals)
    const FRACTIONS=[];
    for(let i=1;i<5;i++) FRACTIONS.push([i,5]);
    for(let i=1;i<6;i++) FRACTIONS.push([i,6]);
    for(let i=1;i<7;i++) FRACTIONS.push([i,7]);
    for(let i=1;i<8;i++) FRACTIONS.push([i,8]);
    [[1,9],[1,11],[1,12],[1,16],[1,32]].forEach(f=>FRACTIONS.push(f));

    /******** π digits (first 500 after the decimal) ********/
    const PI_DIGITS = (
      "14159265358979323846264338327950288419716939937510" +
      "58209749445923078164062862089986280348253421170679" +
      "82148086513282306647093844609550582231725359408128" +
      "48111745028410270193852110555964462294895493038196" +
      "44288109756659334461284756482337867831652712019091" +
      "45648566923460348610454326648213393607260249141273" +
      "72458700660631558817488152092096282925409171536436" +
      "78925903600113305305488204665213841469519415116094" +
      "33057270365759591953092186117381932611793105118548" +
      "07446237996274956735188575272489122793818301194912"
    );

    /******** Mistake logging ********/
    const MKEY='mistakes_v1';
    const loadMistakes=()=>{ try{ return JSON.parse(localStorage.getItem(MKEY)||'{}'); }catch{ return {}; } };
    const saveMistakes=obj=> localStorage.setItem(MKEY, JSON.stringify(obj));
    function recordAttempt(drill,item,ok){
      const base=item.src || drill;
      const idKey=`${base}|${item.id}`;
      const data=loadMistakes();
      const row=data[idKey] || {text:item.text, drill:base, wrongs:0, attempts:0, lastMiss:0};
      row.attempts++; if(!ok){ row.wrongs++; row.lastMiss=Date.now(); }
      row.text=item.text; data[idKey]=row; saveMistakes(data);
    }
    const clearMistakeStats=()=>{ localStorage.removeItem(MKEY); localStorage.removeItem('timing_v1'); localStorage.removeItem('timing_last_v1'); };

    /******** Response time tracking (mult12) ********/
    const TKEY='timing_v1';
    const LKEY='timing_last_v1';
    const loadTiming=()=>{ try{ return JSON.parse(localStorage.getItem(TKEY)||'{}'); }catch{ return {}; } };
    const saveTiming=obj=> localStorage.setItem(TKEY, JSON.stringify(obj));
    const loadLastSession=()=>{ try{ return JSON.parse(localStorage.getItem(LKEY)||'{}'); }catch{ return {}; } };
    let sessionTimings={};
    function recordTiming(drill,itemId,ms){
      if(ms<150||ms>25000) return;
      // all-time
      const data=loadTiming();
      const key=`${drill}|${itemId}`;
      const row=data[key]||{totalMs:0,count:0};
      row.totalMs+=ms; row.count++;
      data[key]=row; saveTiming(data);
      // current session
      const sr=sessionTimings[itemId]||{totalMs:0,count:0};
      sr.totalMs+=ms; sr.count++;
      sessionTimings[itemId]=sr;
    }
    function flushSessionTimings(){
      if(drill==='mult12' && Object.keys(sessionTimings).length>0)
        localStorage.setItem(LKEY, JSON.stringify(sessionTimings));
    }
    function getAvgMs(data,key){ const r=data[key]; return r&&r.count? r.totalMs/r.count : null; }
    function timingCell(avgMs,baseAvgMs){
      if(avgMs===null) return `<td style="text-align:center;color:#3a4460">—</td>`;
      const s=(avgMs/1000).toFixed(1)+'s';
      if(!baseAvgMs) return `<td style="text-align:center" class="mono">${s}</td>`;
      const ratio=avgMs/baseAvgMs;
      const color=ratio>=2.0?'var(--bad)':ratio>=1.4?'#eab308':'#6aaa6a';
      return `<td style="text-align:center;white-space:nowrap;color:${color}" class="mono" title="${s} · ${ratio.toFixed(1)}× baseline">${s}</td>`;
    }

    /******** High scores ********/
    const hiscoreKey=d=>`hiscore_${d}`;
    const getBest=d=> parseInt(localStorage.getItem(hiscoreKey(d))||'0',10);
    const setBest=(d,v)=> localStorage.setItem(hiscoreKey(d), String(v));
    function clearScores(){ Object.keys(localStorage).forEach(k=>{ if(k.startsWith('hiscore_')||k.startsWith('hshistory_')) localStorage.removeItem(k); }); }
    function getTodayBest(d){ const h=getHistory(d); if(!h.length) return 0; const midnight=new Date(); midnight.setHours(0,0,0,0); const since=midnight.getTime(); const sc=h.filter(e=>e.ts>=since).map(e=>e.score); return sc.length?Math.max(...sc):0; }

    /******** Score history ********/
    const historyKey=d=>`hshistory_${d}`;
    const getHistory=d=>{ try{ return JSON.parse(localStorage.getItem(historyKey(d))||'[]'); }catch{ return []; } };
    function appendHistory(d,v){ const h=getHistory(d); h.push({score:v,ts:Date.now()}); if(h.length>200) h.splice(0,h.length-200); localStorage.setItem(historyKey(d),JSON.stringify(h)); }

    /******** Banks (finite) ********/
    function buildBank(key){
      const items=[], weights=new Map();
      const add=(id,text,ans,type='int',w=1)=>{ items.push({id,text,ans,type}); weights.set(id,w); };

      // Addition facts 1–15
      if(key==='addTable'){
        for(let a=1;a<=15;a++){
          for(let b=1;b<=15;b++){
            const w = isSimple(a,b) ? SIMPLE_BIAS : 1;
            add(`a${a}b${b}`, `${a} + ${b}`, a+b, 'int', w);
          }
        }
      }

      // Subtraction facts within 1..15, a>=b
      if(key==='subTable'){
        for(let a=1;a<=15;a++){
          for(let b=1;b<=a;b++){
            const w = isSimple(a,b) ? SIMPLE_BIAS : 1;
            add(`a${a}b${b}`, `${a} − ${b}`, a-b, 'int', w);
          }
        }
      }

      // 12×
      if(key==='mult12'){ for(let b=1;b<=15;b++){ const w=(b===1||b===2||b===5||b===10)?0.6:1; add(`12x${b}`,`12 × ${b}`,12*b,'int',w);} }

      // 16× (1–11)
      if(key==='mult16'){ for(let b=1;b<=11;b++){ const w=(b===1||b===2||b===5||b===10)?0.6:1; add(`16x${b}`,`16 × ${b}`,16*b,'int',w);} }

      // 12× & 16× combo
      if(key==='mult1216'){
        const b12=buildBank('mult12'); const b16=buildBank('mult16');
        for(const it of b12.items){ items.push(it); weights.set(it.id, b12.weights.get(it.id)); }
        for(const it of b16.items){ items.push(it); weights.set(it.id, b16.weights.get(it.id)); }
      }

      // 15× (2–15)
      if(key==='mult15x'){ for(let b=2;b<=15;b++){ const w=(b===2||b===5||b===10)?0.6:1; add(`15x${b}`,`15 × ${b}`,15*b,'int',w);} }

      // Multiplication 2–N
      if(key==='mult10' || key==='mult15'){
        const N=(key==='mult10'?10:15);
        for(let a=2;a<=N;a++){ for(let b=2;b<=N;b++){ const w=isSimple(a,b)?SIMPLE_BIAS:1; add(`${a}x${b}`,`${a} × ${b}`,a*b,'int',w);} }
      }

      // Division (standalone drill, includes scaling)
      if(key==='div'){
        for(let d=2; d<=20; d++){
          for(let q=2; q<=20; q++){
            for(let k=0; k<=2; k++){
              const dividend = d*q*Math.pow(10,k);
              const divisor = d;
              const ans = q*Math.pow(10,k);
              const w = (d===2||d===5||d===10)?SIMPLE_BIAS:1;
              add(`d${d}q${q}k${k}`, `${fmt(dividend)} ÷ ${fmt(divisor)}`, ans, 'int', w);
            }
          }
        }
      }

      // Basic division for Mixed (no scaling)
      if(key==='divBasic'){
        for(let d=2; d<=20; d++){
          for(let q=2; q<=20; q++){
            const dividend = d*q, divisor = d, ans = q;
            const w = (d===2||d===5||d===10)?SIMPLE_BIAS:1;
            add(`db${d}q${q}`, `${fmt(dividend)} ÷ ${fmt(divisor)}`, ans, 'int', w);
          }
        }
      }

      // Zero-canceling division (separate drill)
      if(key==='divZeros'){
        const D = [2,3,4,5,6,8,9,12,15];
        for(const d of D){
          for(let q=2; q<=20; q++){
            for(let k=1; k<=4; k++){
              for(let m=1; m<=k; m++){
                const dividend = d*q*Math.pow(10,k);
                const divisor  = d*Math.pow(10,m);
                const ans = q*Math.pow(10,k-m);
                const w = (d===2||d===5||d===10)?0.7:1;
                add(`dz${d}_${q}_${k}_${m}`, `${fmt(dividend)} ÷ ${fmt(divisor)}`, ans, 'int', w);
              }
            }
          }
        }
      }

      // Squares 1..25 (forward and reverse √)
      if(key==='squares'){
        for(let n=1;n<=25;n++){
          add(`sq${n}`, `${n}²`, n*n, 'int');          // forward: n² → n²
          add(`rt${n}`, `√(${n*n})`, n, 'int');        // reverse: √(n²) → n
        }
      }

      // Cubes 1..10 (forward and reverse ∛)
      if(key==='cubes'){
        for(let n=1;n<=10;n++){
          add(`cu${n}`, `${n}³`, n*n*n, 'int');        // forward: n³ → n³
          add(`crt${n}`, `∛(${n*n*n})`, n, 'int');     // reverse: ∛(n³) → n
        }
      }

      // Other drills
      if(key==='roots'){ [2,3,5].forEach(r=>add(`r${r}`,`√${r} (3 dp)`,parseFloat(Math.sqrt(r).toFixed(3)),'float')); }
      if(key==='exp2'){ for(let e=1;e<=10;e++) add(`2^${e}`,`2^${e}`,2**e,'int'); }
      if(key==='exp3'){ for(let e=1;e<=5;e++) add(`3^${e}`,`3^${e}`,3**e,'int'); }
      if(key==='exp4'){ for(let e=1;e<=5;e++) add(`4^${e}`,`4^${e}`,4**e,'int'); }
      if(key==='exp5'){ for(let e=1;e<=5;e++) add(`5^${e}`,`5^${e}`,5**e,'int'); }
      if(key==='decimals'){ for(const [n,d] of FRACTIONS) add(`${n}/${d}`,`${n}/${d} (3 dp)`,parseFloat((n/d).toFixed(3)),'float'); }

      return {items, weights};
    }

    // Mixed bank (no addition; no zero-cancel feel)
    function buildMixedBank(){
      const keys=['mult12','mult10','mult15','divBasic','squares','cubes','roots','exp2','exp3','exp4','exp5','decimals'];
      const items=[], weights=new Map();
      for (const k of keys){
        const b=buildBank(k);
        for (const it of b.items){
          const id=`${k}:${it.id}`;
          items.push({id, text:it.text, ans:it.ans, type:it.type, src:k});
          weights.set(id, b.weights.get(it.id) ?? 1);
        }
      }
      return {items,weights};
    }

    function pickWeighted(bank){
      let total=0; for(const id of bank.weights.keys()) total+=bank.weights.get(id);
      let r=Math.random()*total;
      for(const it of bank.items){ r-=bank.weights.get(it.id); if(r<=0) return it; }
      return bank.items[bank.items.length-1];
    }
    const updateWeight=(bank,id,ok)=>{
      const w=bank.weights.get(id) ?? 1;
      bank.weights.set(id, ok ? Math.max(0.25, w-0.2) : Math.min(5, w+1));
    };

    // Two-digit addition (open-set)
    const addBucket=[];
    const pickAdd=()=>{
      if(addBucket.length && Math.random()<0.6){
        const total=addBucket.reduce((s,x)=>s+x.count,0);
        let r=Math.random()*total;
        for(const m of addBucket){ r-=m.count; if(r<=0) return {id:m.key,text:`${m.a} + ${m.b}`,ans:m.a+m.b,type:'int',a:m.a,b:m.b,src:'add2'}; }
      }
      const a=rand(10,99), b=rand(10,99);
      return {id:`${a}+${b}`, text:`${a} + ${b}`, ans:a+b, type:'int', a,b, src:'add2'};
    };
    function recordAddResult(item,ok){
      const i=addBucket.findIndex(x=>x.key===item.id);
      if(ok){ if(i>-1){ addBucket[i].count--; if(addBucket[i].count<=0) addBucket.splice(i,1);} }
      else  { if(i>-1) addBucket[i].count=Math.min(5, addBucket[i].count+1);
              else addBucket.push({key:item.id, a:item.a, b:item.b, count:2}); }
    }

    // Two-digit subtraction (open-set)
    const subBucket=[];
    const pickSub=()=>{
      if(subBucket.length && Math.random()<0.6){
        const total=subBucket.reduce((s,x)=>s+x.count,0);
        let r=Math.random()*total;
        for(const m of subBucket){
          r-=m.count;
          if(r<=0) return {id:m.key, text:`${m.a} − ${m.b}`, ans:m.a-m.b, type:'int', a:m.a, b:m.b, src:'sub2'};
        }
      }
      let a=rand(10,99), b=rand(10,99);
      if(a<b) [a,b]=[b,a];
      return {id:`${a}-${b}`, text:`${a} − ${b}`, ans:a-b, type:'int', a,b, src:'sub2'};
    };
    function recordSubResult(item,ok){
      const i=subBucket.findIndex(x=>x.key===item.id);
      if(ok){ if(i>-1){ subBucket[i].count--; if(subBucket[i].count<=0) subBucket.splice(i,1);} }
      else  { if(i>-1) subBucket[i].count=Math.min(5, subBucket[i].count+1);
              else subBucket.push({key:item.id, a:item.a, b:item.b, count:2}); }
    }

    /******** Accuracy helpers for reference tables ********/
    function accuracyCellList(mdata, drillId, itemId){
      const row=mdata[`${drillId}|${itemId}`];
      if(!row||!row.attempts) return `<td style="text-align:center"><span class="acc-dot" style="background:#3a4460" title="No data yet"></span><span style="font-size:.8rem;color:#3a4460">—</span></td>`;
      const pct=Math.round(100-(row.wrongs/row.attempts)*100);
      const color=pct>=90?'var(--good)':pct>=60?'#eab308':'var(--bad)';
      return `<td style="text-align:center;white-space:nowrap"><span class="acc-dot" style="background:${color}" title="${pct}% (${row.attempts-row.wrongs}/${row.attempts})"></span><span style="font-size:.8rem;color:${color}">${pct}%</span></td>`;
    }
    function accuracyStyleMatrix(mdata, drillId, itemId){
      const row=mdata[`${drillId}|${itemId}`];
      if(!row||!row.attempts) return '';
      const pct=Math.round(100-(row.wrongs/row.attempts)*100);
      return pct>=90?'background:rgba(22,163,74,.18)':pct>=60?'background:rgba(234,179,8,.18)':'background:rgba(239,68,68,.18)';
    }
    function combinedStyleMatrix(mdata, tdata, drillId, itemId, baselineMs){
      const mrow=mdata[`${drillId}|${itemId}`];
      if(!mrow||!mrow.attempts) return '';
      const acc=Math.round(100-(mrow.wrongs/mrow.attempts)*100);
      if(acc<60) return 'background:rgba(239,68,68,.18)';
      const accScore=acc/100;
      const trow=tdata[`${drillId}|${itemId}`];
      if(!trow||!trow.count||!baselineMs)
        return acc>=90?'background:rgba(22,163,74,.18)':'background:rgba(234,179,8,.18)';
      const ratio=(trow.totalMs/trow.count)/baselineMs;
      const combined=0.6*accScore+0.4*Math.min(1,1/ratio);
      return combined>=0.85?'background:rgba(22,163,74,.18)':combined>=0.60?'background:rgba(234,179,8,.18)':'background:rgba(239,68,68,.18)';
    }

    /******** Reference (compact answer sheets) ********/
    const REFERENCEABLE = new Set([
      'mult12','mult16','mult1216','mult15x','mult10','mult15',
      'addTable','subTable',
      'squares','cubes','roots','exp2','exp3','exp4','exp5','decimals'
    ]);
    const $=id=>document.getElementById(id);
    function hasReference(drill){ return REFERENCEABLE.has(drill); }

    const thRow = labels => `<tr>${labels.map(c=>`<th>${c}</th>`).join('')}</tr>`;
    const tdRow = cells  => `<tr>${cells.map(c=>`<td class="mono">${c}</td>`).join('')}</tr>`;

    function table12(mdata){
      const tdata=loadTiming(), ldata=loadLastSession();
      const baseAll=getAvgMs(tdata,'mult12|12x1'), baseLast=getAvgMs(ldata,'12x1');
      const rows=[thRow(['12 × b','Ans','Acc','All-time','Last session'])];
      for(let b=1;b<=15;b++){
        const id=`12x${b}`;
        rows.push(`<tr><td class="mono">12 × ${b}</td><td class="mono">${12*b}</td>${accuracyCellList(mdata,'mult12',id)}${timingCell(getAvgMs(tdata,`mult12|${id}`),baseAll)}${timingCell(getAvgMs(ldata,id),baseLast)}</tr>`);
      }
      return `<div class="card"><h4>12×</h4><table class="tighttable">${rows.join('')}</table></div>`;
    }
    function table16(mdata){
      const rows=[thRow(['16 × b','Ans',''])];
      for(let b=1;b<=11;b++) rows.push(`<tr><td class="mono">16 × ${b}</td><td class="mono">${16*b}</td>${accuracyCellList(mdata,'mult16',`16x${b}`)}</tr>`);
      return `<div class="card"><h4>16×</h4><table class="tighttable">${rows.join('')}</table></div>`;
    }
    function table15x(mdata){
      const rows=[thRow(['15 × b','Ans',''])];
      for(let b=2;b<=15;b++) rows.push(`<tr><td class="mono">15 × ${b}</td><td class="mono">${15*b}</td>${accuracyCellList(mdata,'mult15x',`15x${b}`)}</tr>`);
      return `<div class="card"><h4>15× (2–15)</h4><table class="tighttable">${rows.join('')}</table></div>`;
    }
    function tableMultMatrix(N, mdata){
      const drillId=N===10?'mult10':'mult15';
      const hdr=['×',...Array.from({length:N-1},(_,i)=>i+2)];
      const rows=[thRow(hdr)];
      for(let a=2;a<=N;a++){
        const cells=`<td>${a}</td>`+Array.from({length:N-1},(_,j)=>{
          const b=j+2, s=accuracyStyleMatrix(mdata,drillId,`${a}x${b}`);
          return `<td class="mono"${s?` style="${s}"`:''} title="${a}×${b}=${a*b}">${a*b}</td>`;
        }).join('');
        rows.push(`<tr>${cells}</tr>`);
      }
      return `<div class="card"><h4>${N===10?'Mult 2–10':'Mult 2–15'}</h4><table class="tighttable">${rows.join('')}</table></div>`;
    }
    function tableAddMatrix(N=15, mdata){
      const tdata=loadTiming();
      let baselineMs=null;
      for(let a=1;a<=N;a++) for(let b=1;b<=N;b++){
        const r=tdata[`addTable|a${a}b${b}`];
        if(r&&r.count>=2){ const avg=r.totalMs/r.count; if(baselineMs===null||avg<baselineMs) baselineMs=avg; }
      }
      const hdr=['+',...Array.from({length:N},(_,i)=>i+1)];
      const rows=[thRow(hdr)];
      for(let a=1;a<=N;a++){
        const cells=`<td>${a}</td>`+Array.from({length:N},(_,j)=>{
          const b=j+1, s=combinedStyleMatrix(mdata,tdata,'addTable',`a${a}b${b}`,baselineMs);
          return `<td class="mono"${s?` style="${s}"`:''} title="${a}+${b}=${a+b}">${a+b}</td>`;
        }).join('');
        rows.push(`<tr>${cells}</tr>`);
      }
      return `<div class="card"><h4>Add 1–15</h4><table class="tighttable">${rows.join('')}</table></div>`;
    }
    function tableSubMatrix(N=15, mdata){
      const hdr=['−',...Array.from({length:N},(_,i)=>i+1)];
      const rows=[thRow(hdr)];
      for(let a=1;a<=N;a++){
        const cells=`<td>${a}</td>`+Array.from({length:N},(_,j)=>{
          const b=j+1;
          if(a<b) return `<td>—</td>`;
          const s=accuracyStyleMatrix(mdata,'subTable',`a${a}b${b}`);
          return `<td class="mono"${s?` style="${s}"`:''} title="${a}−${b}=${a-b}">${a-b}</td>`;
        }).join('');
        rows.push(`<tr>${cells}</tr>`);
      }
      return `<div class="card"><h4>Sub ≤15</h4><table class="tighttable">${rows.join('')}</table></div>`;
    }
    function tableList(title, pairs, mdata, drillId, ids){
      const hasAcc=mdata&&drillId&&ids;
      const rows=[thRow(hasAcc?[title,'Ans','']:[title,'Ans'])];
      for(let i=0;i<pairs.length;i++){
        const [label,ans]=pairs[i];
        if(hasAcc) rows.push(`<tr><td class="mono">${label}</td><td class="mono">${ans}</td>${accuracyCellList(mdata,drillId,ids[i])}</tr>`);
        else rows.push(tdRow([label,ans]));
      }
      return `<div class="card"><h4>${title}</h4><table class="tighttable">${rows.join('')}</table></div>`;
    }

    function getReferenceHTML(drill){
      const mdata=loadMistakes();
      if(drill==='mult12')   return `<div class="refgrid">${table12(mdata)}</div>`;
      if(drill==='mult16')   return `<div class="refgrid">${table16(mdata)}</div>`;
      if(drill==='mult1216') return `<div class="refgrid">${table12(mdata)}${table16(mdata)}</div>`;
      if(drill==='mult15x')  return `<div class="refgrid">${table15x(mdata)}</div>`;
      if(drill==='mult10')   return `<div class="refgrid">${tableMultMatrix(10,mdata)}</div>`;
      if(drill==='mult15')   return `<div class="refgrid">${tableMultMatrix(15,mdata)}</div>`;
      if(drill==='addTable') return `<div class="refgrid">${tableAddMatrix(15,mdata)}</div>`;
      if(drill==='subTable') return `<div class="refgrid">${tableSubMatrix(15,mdata)}</div>`;
      if(drill==='squares'){
        const pairs=Array.from({length:25},(_,i)=>[`${i+1}²`,(i+1)**2]);
        const ids=Array.from({length:25},(_,i)=>`sq${i+1}`);
        return `<div class="refgrid">${tableList('Squares 1²–25²',pairs,mdata,'squares',ids)}</div>`;
      }
      if(drill==='cubes'){
        const pairs=Array.from({length:10},(_,i)=>[`${i+1}³`,(i+1)**3]);
        const ids=Array.from({length:10},(_,i)=>`cu${i+1}`);
        return `<div class="refgrid">${tableList('Cubes 1³–10³',pairs,mdata,'cubes',ids)}</div>`;
      }
      if(drill==='roots'){
        const pairs=[[`√2 (3 dp)`,(Math.sqrt(2)).toFixed(3)],[`√3 (3 dp)`,(Math.sqrt(3)).toFixed(3)],[`√5 (3 dp)`,(Math.sqrt(5)).toFixed(3)]];
        return `<div class="refgrid">${tableList('Roots',pairs,mdata,'roots',['r2','r3','r5'])}</div>`;
      }
      if(drill==='exp2'){
        const pairs=Array.from({length:10},(_,e)=>[`2^${e+1}`,2**(e+1)]);
        const ids=Array.from({length:10},(_,e)=>`2^${e+1}`);
        return `<div class="refgrid">${tableList('Powers of 2',pairs,mdata,'exp2',ids)}</div>`;
      }
      if(drill==='exp3'){
        const pairs=Array.from({length:5},(_,e)=>[`3^${e+1}`,3**(e+1)]);
        const ids=Array.from({length:5},(_,e)=>`3^${e+1}`);
        return `<div class="refgrid">${tableList('Powers of 3',pairs,mdata,'exp3',ids)}</div>`;
      }
      if(drill==='exp4'){
        const pairs=Array.from({length:5},(_,e)=>[`4^${e+1}`,4**(e+1)]);
        const ids=Array.from({length:5},(_,e)=>`4^${e+1}`);
        return `<div class="refgrid">${tableList('Powers of 4',pairs,mdata,'exp4',ids)}</div>`;
      }
      if(drill==='exp5'){
        const pairs=Array.from({length:5},(_,e)=>[`5^${e+1}`,5**(e+1)]);
        const ids=Array.from({length:5},(_,e)=>`5^${e+1}`);
        return `<div class="refgrid">${tableList('Powers of 5',pairs,mdata,'exp5',ids)}</div>`;
      }
      if(drill==='decimals'){
        const pairs=[],ids=[];
        for(let i=1;i<5;i++){ pairs.push([`${i}/5 (3 dp)`,(i/5).toFixed(3)]); ids.push(`${i}/5`); }
        for(let i=1;i<6;i++){ pairs.push([`${i}/6 (3 dp)`,(i/6).toFixed(3)]); ids.push(`${i}/6`); }
        for(let i=1;i<7;i++){ pairs.push([`${i}/7 (3 dp)`,(i/7).toFixed(3)]); ids.push(`${i}/7`); }
        for(let i=1;i<8;i++){ pairs.push([`${i}/8 (3 dp)`,(i/8).toFixed(3)]); ids.push(`${i}/8`); }
        [[1,9],[1,11],[1,12],[1,16],[1,32]].forEach(([n,d])=>{ pairs.push([`${n}/${d} (3 dp)`,(n/d).toFixed(3)]); ids.push(`${n}/${d}`); });
        return `<div class="refgrid">${tableList('Fractions → decimals',pairs,mdata,'decimals',ids)}</div>`;
      }
      return `<div class="card">No reference available.</div>`;
    }

    function labelFor(k){
      const map={
        mixed:'Mixed (no addition; no zero-cancel)',
        mult12:'12 × (1–15)', mult16:'16 × (1–11)', mult1216:'12× & 16×',
        mult15x:'15 × (2–15)', mult10:'Mult 1–10', mult15:'Mult 1–15',

        subTable:'Subtraction facts (≤15)',
        div:'Division (≤20 tables)', divZeros:'Division (zero-canceling)',
        add2:'Two-digit addition', sub2:'Two-digit subtraction',
        squares:'Perfect squares (1²–25²)', // updated label
        cubes:'Perfect cubes (1³–10³)',
        roots:'Roots (√2,√3,√5)', exp2:'Powers of 2', exp3:'Powers of 3', exp4:'Powers of 4',
        exp5:'Powers of 5', decimals:'Fractions → decimals',
        pi:'π — How many can you remember?'
      };
      return map[k]||k;
    }

    function pickQuestion(){
      if(drill==='add2') return pickAdd();
      if(drill==='sub2') return pickSub();
      if(drill==='pi')   return {id:'pi', text:'Type digits of π after “3.” then press Enter', type:'pi'};
      return pickWeighted(bank);
    }

    function ask(){
      awaiting=false;
      current=pickQuestion();
      qEl.textContent=current.text;
      aEl.disabled=false; aEl.value=''; aEl.focus({preventScroll:true});
      fb.textContent=''; fb.className='';
      questionStartTime=Date.now();
    }

    function checkPi(){
      const raw=aEl.value.trim();
      if(!raw){ fb.textContent='Type digits after 3. then press Enter'; fb.className=''; return; }

      const s = raw.replace(/\s/g,'');
      const digitsOnly = (s.match(/\d/g)||[]).join('');
      if(digitsOnly.length===0){ fb.textContent='Digits only please (e.g., 3.14159…)'; fb.className=''; return; }

      const typed = digitsOnly[0]==='3' ? digitsOnly.slice(1) : digitsOnly;

      let correct=0;
      const max= Math.min(typed.length, PI_DIGITS.length);
      for(let i=0;i<max;i++){
        if(typed[i]===PI_DIGITS[i]) correct++; else break;
      }

      const prevBest = getBest('pi');
      if(correct>prevBest) setBest('pi', correct);
      bestEl.textContent=String(getBest('pi'));

      const pos = correct+1;
      const mismatch = (correct<typed.length && correct<PI_DIGITS.length);
      const expected = mismatch ? PI_DIGITS[correct] : null;
      const got = mismatch ? typed[correct] : null;

      fb.textContent = `You got ${correct} digit${correct===1?'':'s'} right in a row.`;
      fb.className='correct';

      aEl.disabled=true; awaiting=true;

      const hint = mismatch
        ? `<div class="small">Mismatch at digit #${pos} (after 3.): expected <b>${expected}</b>, got <b>${got}</b>.</div>`
        : (typed.length>PI_DIGITS.length
            ? `<div class="small">Great! You exceeded the built-in check (${PI_DIGITS.length} digits). Want me to extend it?</div>`
            : '');

      endpanel.innerHTML = `
        <div class="row" style="flex-wrap:wrap; justify-content:center">
          <span class="badge">Best: <b>${getBest('pi')}</b></span>
          <button class="pill" id="again">Try Again</button>
        </div>
        ${hint}
      `;
      document.getElementById('again').addEventListener('click',()=>start('pi'));
    }

    function check(){
      if(awaiting) return;
      const raw=aEl.value.trim(); if(!raw) return;

      if(drill==='pi'){ checkPi(); return; }

      let ok=false;
      if(current.type==='float'){
        const user=parseFloat(raw.replace(/,/g,''));
        if(!Number.isNaN(user) && Math.abs(user-current.ans)<0.01) ok=true;
      }else{
        const user=parseIntClean(raw);
        if(!Number.isNaN(user) && user===current.ans) ok=true;
      }

      if(drill==='mult12'||drill==='addTable') recordTiming(drill,current.id,Date.now()-questionStartTime);
      recordAttempt(drill,current,ok);
      if(drill==='add2') recordAddResult(current,ok);
      else if(drill==='sub2') recordSubResult(current,ok);
      else updateWeight(bank,current.id,ok);

      if(isSprint){
        if(ok){ score++; scoreEl.textContent=String(score); }
        ask(); // no delay
        return;
      }

      fb.textContent = ok ? '✅ Correct!' : `❌ (${current.type==='float'?current.ans.toFixed(3):fmt(current.ans)})`;
      fb.className = ok ? 'correct' : 'wrong';
      aEl.disabled=true; awaiting=true;
      setTimeout(()=>{ awaiting=false; ask(); }, ok?650:1100);
    }

    function finishSprint(){
      flushSessionTimings();
      if(tick){ clearInterval(tick); tick=null; }
      aEl.disabled=true;
      appendHistory(drill,score);
      const prev=getBest(drill);
      if(score>prev) setBest(drill,score);
      bestEl.textContent=String(getBest(drill));
      endpanel.innerHTML = `
        <div class="row" style="flex-wrap:wrap; justify-content:center">
          <span class="badge">Time! Score: <b>${score}</b> — Best: <b>${getBest(drill)}</b>${score>prev?' 🎉':''}</span>
          <button class="pill" id="again">Play Again</button>
        </div>`;
      document.getElementById('again').addEventListener('click',()=>start(drill));
    }

    aEl.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); if(isSprint && timeLeft<=0) return; check(); } });
    submitBtn.addEventListener('click', (e)=>{ e.preventDefault(); if(isSprint && timeLeft<=0) return; check(); });

    back.addEventListener('click', ()=>{
      flushSessionTimings();
      if(tick){ clearInterval(tick); tick=null; }
      quiz.hidden=true; menu.hidden=false; hud.hidden=true;
      aEl.value=''; fb.textContent=''; fb.className=''; endpanel.innerHTML='';
      refreshMenuBestFor(drill);
      renderSprintRecords();
      updateDrillButtons();
      drill=null; bank=null; current=null; score=0;
    });

    window.addEventListener('popstate', ()=>{
      if(!quiz.hidden){
        flushSessionTimings();
        if(tick){ clearInterval(tick); tick=null; }
        quiz.hidden=true; menu.hidden=false; hud.hidden=true;
        aEl.value=''; fb.textContent=''; fb.className=''; endpanel.innerHTML='';
        if(drill){ refreshMenuBestFor(drill); renderSprintRecords(); }
        drill=null; bank=null; current=null; score=0;
        updateDrillButtons();
      } else if(!settings.hidden){
        settings.hidden=true; menu.hidden=false;
      }
    });

    /******** Reference UI handlers ********/
    function openReference(){
      refTitle.textContent = `Reference — ${labelFor(drill)}`;
      refContent.innerHTML = getReferenceHTML(drill);
      refModal.hidden=false;
    }
    function closeReference(){ refModal.hidden=true; aEl.focus({preventScroll:true}); }
    hudBest.style.cursor='pointer';
    hudBest.title='Click to see score history';
    hudBest.addEventListener('click',()=>{ if(drill) openHistoryModal(drill); });

    $('sprintRecordsGrid').addEventListener('click',e=>{
      const btn=e.target.closest('[data-drill]');
      if(btn) openHistoryModal(btn.dataset.drill);
    });

    refBtn.addEventListener('click', openReference);
    refCloseBtn.addEventListener('click', closeReference);
    refCloseBg.addEventListener('click', closeReference);

    /******** History chart ********/
    function drawHistoryChart(canvas, history){
      const dpr=window.devicePixelRatio||1;
      const W=canvas.offsetWidth||800, H=280;
      canvas.width=W*dpr; canvas.height=H*dpr;
      canvas.style.height=H+'px';
      const ctx=canvas.getContext('2d');
      ctx.scale(dpr,dpr);

      const PAD={top:24,right:24,bottom:48,left:44};
      const cW=W-PAD.left-PAD.right, cH=H-PAD.top-PAD.bottom;

      ctx.fillStyle='#0b1220'; ctx.fillRect(0,0,W,H);

      const scores=history.map(h=>h.score);
      const times=history.map(h=>h.ts);
      const maxS=Math.max(...scores,1);
      const minT=Math.min(...times), maxT=Math.max(...times);
      const bestS=Math.max(...scores);

      const xOf=t=> PAD.left+(times.length<2?cW/2:(t-minT)/(maxT-minT)*cW);
      const yOf=s=> PAD.top+cH-(s/maxS)*cH;

      // Grid & Y labels
      const ticks=4;
      for(let i=0;i<=ticks;i++){
        const y=PAD.top+(i/ticks)*cH;
        const val=Math.round(maxS*(1-i/ticks));
        ctx.strokeStyle='#1e2a4a'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(PAD.left,y); ctx.lineTo(PAD.left+cW,y); ctx.stroke();
        ctx.fillStyle='#7a8a9a'; ctx.font=`${11*dpr/dpr}px system-ui`; ctx.textAlign='right';
        ctx.fillText(val,PAD.left-6,y+4);
      }

      // Best dashed line
      const bestY=yOf(bestS);
      ctx.setLineDash([5,4]); ctx.strokeStyle='rgba(251,191,36,.45)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(PAD.left,bestY); ctx.lineTo(PAD.left+cW,bestY); ctx.stroke();
      ctx.setLineDash([]);

      // Line
      ctx.strokeStyle='#3b82f6'; ctx.lineWidth=2.5;
      ctx.beginPath();
      history.forEach((h,i)=>{ const x=xOf(h.ts),y=yOf(h.score); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
      ctx.stroke();

      // Dots
      history.forEach(h=>{
        const x=xOf(h.ts), y=yOf(h.score), isBest=h.score===bestS;
        ctx.beginPath(); ctx.arc(x,y,isBest?5.5:3.5,0,Math.PI*2);
        ctx.fillStyle=isBest?'#fbbf24':'#60a5fa'; ctx.fill();
        ctx.strokeStyle='#0b1220'; ctx.lineWidth=1.5; ctx.stroke();
      });

      // X labels (up to 7)
      const n=Math.min(history.length,7);
      ctx.fillStyle='#7a8a9a'; ctx.font=`10px system-ui`; ctx.textAlign='center';
      for(let i=0;i<n;i++){
        const idx=Math.round(i*(history.length-1)/Math.max(n-1,1));
        const h=history[idx], d=new Date(h.ts);
        const label=`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        ctx.fillText(label,xOf(h.ts),PAD.top+cH+18);
      }
    }

    function openHistoryModal(d){
      $('histTitle').textContent=`Sprint History — ${labelFor(d)}`;
      const history=getHistory(d);
      const canvas=$('histChart'), empty=$('histEmpty');
      if(!history.length){ canvas.style.display='none'; empty.style.display='block'; }
      else{ canvas.style.display='block'; empty.style.display='none'; drawHistoryChart(canvas,history); }
      $('historyModal').hidden=false;
    }
    function closeHistoryModal(){ $('historyModal').hidden=true; }
    $('histCloseBtn').addEventListener('click',closeHistoryModal);
    $('histCloseBg').addEventListener('click',closeHistoryModal);

    /******** Settings render ********/
    function fmtAgo(ts){
      if(!ts) return '—';
      const s=Math.floor((Date.now()-ts)/1000);
      if(s<60) return s+'s ago';
      const m=Math.floor(s/60); if(m<60) return m+'m ago';
      const h=Math.floor(m/60); if(h<24) return h+'h ago';
      const d=Math.floor(h/24); return d+'d ago';
    }
    function renderStats(){
      const data=loadMistakes();
      const rows=Object.entries(data).map(([key,val])=>({key, ...val}));
      const flt=fltDrill.value;
      let lst = rows.filter(r=> !flt || r.drill===flt);

      const sort=fltSort.value;
      lst.sort((a,b)=>{
        if(sort==='wrongs') return (b.wrongs||0)-(a.wrongs||0);
        if(sort==='rate'){
          const ar = a.attempts? a.wrongs/a.attempts : 0;
          const br = b.attempts? b.wrongs/b.attempts : 0;
          return br - ar;
        }
        if(sort==='recent') return (b.lastMiss||0)-(a.lastMiss||0);
        if(sort==='attempts') return (b.attempts||0)-(a.attempts||0);
        return 0;
      });

      const top = lst.slice(0,50);
      const table = `
        <table>
          <thead>
            <tr>
              <th>Drill</th>
              <th>Question</th>
              <th class="right">Wrongs</th>
              <th class="right">Attempts</th>
              <th class="right">Accuracy</th>
              <th class="right">Last miss</th>
            </tr>
          </thead>
          <tbody>
            ${top.map(r=>`
              <tr>
                <td><span class="drilltag">${r.drill}</span></td>
                <td class="mono">${r.text}</td>
                <td class="right mono">${r.wrongs||0}</td>
                <td class="right mono">${r.attempts||0}</td>
                <td class="right mono">${r.attempts? (100 - Math.round((r.wrongs/r.attempts)*100))+'%' : '—'}</td>
                <td class="right small">${fmtAgo(r.lastMiss||0)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <div class="small" style="margin-top:.4rem;">Showing top ${top.length} items</div>
      `;
      statsContainer.innerHTML = table;

      const drills=['mixed','mult12','mult16','mult1216','mult15x','mult10','mult15','addTable','subTable','div','divZeros','add2','sub2','squares','cubes','roots','exp2','exp3','exp4','exp5','decimals','pi'];
      const bests = drills.map(d=>`${d}: ${getBest(d)}`).join('  ·  ');
      const bestDiv = document.createElement('div');
      bestDiv.className='small'; bestDiv.style.marginTop='.6rem';
      bestDiv.textContent = `High scores — ${bests}`;
      statsContainer.appendChild(bestDiv);
    }

    // initialise button stats on page load
    updateDrillButtons();
    renderSprintRecords();
  </script>
</body>
